name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install -e ".[dev]"
          playwright install chromium
          playwright install-deps
      - name: Run tests
        run: pytest -v

  build-linux:
    name: Build (Linux)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: pip install build && python -m build

      - name: Build executable
        run: |
          pip install pyinstaller
          pyinstaller GemiTerm.spec --distpath dist --workpath build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GemiTerm
          path: dist/GemiTerm

  build-windows:
    name: Build (Windows)
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: pip install build && python -m build

      - name: Build executable
        run: |
          pip install pyinstaller
          pyinstaller GemiTerm.spec --distpath dist --workpath build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GemiTerm.exe
          path: dist/GemiTerm

  publish:
    name: Publish to PyPI
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: pip install build && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.OIDC_PYPI_TOKEN }}

  release:
    name: Create Release
    needs: [build-linux, build-windows, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: GemiTerm
          path: dist

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: GemiTerm.exe
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true